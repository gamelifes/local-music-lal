name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Copy assets to Android
        run: node build-android.cjs

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          # Specify build-tools version (optional, but helps to avoid downloading unnecessary versions)
          # You can also specify packages: platforms;android-35,build-tools;34.0.0
          # For simplicity, we rely on the action's default behavior with api-level.
          # To reduce download, we can explicitly list packages.
          packages: platforms;android-35,build-tools;34.0.0,platform-tools

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LMusic
          path: android/app/build/outputs/apk/debug/LMusic.apk
          retention-days: 7
