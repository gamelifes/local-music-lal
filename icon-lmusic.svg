<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8B43C"/>
      <stop offset="0.5" stop-color="#D4A017"/>
      <stop offset="1" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="gd2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD700"/>
      <stop offset="1" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.15" stop-color="#FFFFF0"/>
      <stop offset="0.35" stop-color="#FFEE88"/>
      <stop offset="0.55" stop-color="#FFD700"/>
      <stop offset="0.8" stop-color="#FFA500"/>
      <stop offset="1" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="crack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFD700"/>
      <stop offset="0.5" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="gl1"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gl2"><feGaussianBlur stdDeviation="14" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gl3"><feGaussianBlur stdDeviation="28" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ms"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <!-- ====== 耳机头梁 (完整拱形，黑色+金色描边) ====== -->
  <g filter="url(#ms)">
    <!-- 头梁主体 -->
    <path d="M 135 290 Q 135 100 256 70 Q 377 100 377 290" stroke="url(#gd)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- 头梁内衬 -->
    <path d="M 145 285 Q 145 115 256 88 Q 367 115 367 285" stroke="#2a2a2a" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- 头梁高光 -->
    <path d="M 140 280 Q 140 108 256 78 Q 372 108 372 280" stroke="#FFD700" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
    <!-- 左侧铰链 -->
    <rect x="126" y="275" width="22" height="35" rx="5" fill="#1a1a1a" stroke="url(#gd)" stroke-width="2"/>
    <rect x="130" y="282" width="14" height="4" rx="2" fill="#B8860B"/>
    <rect x="130" y="290" width="14" height="4" rx="2" fill="#B8860B"/>
    <!-- 右侧铰链 -->
    <rect x="364" y="275" width="22" height="35" rx="5" fill="#1a1a1a" stroke="url(#gd)" stroke-width="2"/>
    <rect x="368" y="282" width="14" height="4" rx="2" fill="#B8860B"/>
    <rect x="368" y="290" width="14" height="4" rx="2" fill="#B8860B"/>
  </g>

  <!-- ====== 左耳罩 ====== -->
  <g filter="url(#ms)">
    <!-- 连接臂 -->
    <rect x="118" y="300" width="14" height="50" rx="4" fill="#1a1a1a" stroke="url(#gd)" stroke-width="2"/>
    <!-- 耳罩外壳 -->
    <ellipse cx="130" cy="400" rx="68" ry="78" fill="#1a1a1a" stroke="url(#gd)" stroke-width="3"/>
    <!-- 耳罩环 -->
    <ellipse cx="130" cy="400" rx="56" ry="66" fill="none" stroke="#B8860B" stroke-width="2"/>
    <!-- 耳罩垫 -->
    <ellipse cx="130" cy="400" rx="42" ry="52" fill="#111"/>
    <ellipse cx="130" cy="400" rx="35" ry="44" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <!-- 耳罩内侧纹理线 -->
    <path d="M 105 380 Q 130 375 155 380" stroke="#2a2a2a" stroke-width="1.5" fill="none"/>
    <path d="M 100 395 Q 130 390 160 395" stroke="#2a2a2a" stroke-width="1.5" fill="none"/>
    <path d="M 100 410 Q 130 405 160 410" stroke="#2a2a2a" stroke-width="1.5" fill="none"/>
    <path d="M 105 425 Q 130 420 155 425" stroke="#2a2a2a" stroke-width="1.5" fill="none"/>
    <!-- 金色高光 -->
    <path d="M 80 370 Q 85 350 100 340" stroke="#FFD700" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 75 395 Q 72 380 78 365" stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>

  <!-- ====== 右耳罩 ====== -->
  <g filter="url(#ms)">
    <rect x="380" y="300" width="14" height="50" rx="4" fill="#1a1a1a" stroke="url(#gd)" stroke-width="2"/>
    <ellipse cx="382" cy="400" rx="68" ry="78" fill="#1a1a1a" stroke="url(#gd)" stroke-width="3"/>
    <ellipse cx="382" cy="400" rx="56" ry="66" fill="none" stroke="#B8860B" stroke-width="2"/>
    <ellipse cx="382" cy="400" rx="42" ry="52" fill="#111"/>
    <ellipse cx="382" cy="400" rx="35" ry="44" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <path d="M 357 380 Q 382 375 407 380" stroke="#2a2a2a" stroke-width="1.5" fill="none"/>
    <path d="M 352 395 Q 382 390 412 395" stroke="#2a2a2a" stroke-width="1.5" fill="none"/>
    <path d="M 352 410 Q 382 405 412 410" stroke="#2a2a2a" stroke-width="1.5" fill="none"/>
    <path d="M 357 425 Q 382 420 407 425" stroke="#2a2a2a" stroke-width="1.5" fill="none"/>
    <path d="M 432 370 Q 427 350 412 340" stroke="#FFD700" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 437 395 Q 440 380 434 365" stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>

  <!-- ====== 耳罩裂缝 (被闪电劈裂的裂纹) ====== -->
  <g stroke="url(#crack)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8">
    <!-- 左耳罩裂纹 -->
    <path d="M 175 360 L 160 380 L 172 395 L 155 420"/>
    <path d="M 168 340 L 150 360"/>
    <!-- 右耳罩裂纹 -->
    <path d="M 337 360 L 352 380 L 340 395 L 357 420"/>
    <path d="M 344 340 L 362 360"/>
  </g>

  <!-- ====== 闪电底层辉光 ====== -->
  <polygon points="256,2 215,175 270,160 168,500 240,300 185,318 218,185 256,2" fill="#FFD700" opacity="0.12" filter="url(#gl3)"/>

  <!-- ====== 闪电中层辉光 ====== -->
  <polygon points="256,2 215,175 270,160 168,500 240,300 185,318 218,185 256,2" fill="#FFD700" opacity="0.25" filter="url(#gl2)"/>

  <!-- ====== 闪电近层辉光 ====== -->
  <polygon points="256,2 215,175 270,160 168,500 240,300 185,318 218,185 256,2" fill="#FFA500" opacity="0.45" filter="url(#gl1)"/>

  <!-- ====== 闪电本体 ====== -->
  <polygon points="256,2 215,175 270,160 168,500 240,300 185,318 218,185 256,2" fill="url(#bolt)"/>

  <!-- ====== 闪电白热核心 ====== -->
  <polygon points="256,40 232,172 264,160 200,450 242,298 200,310 234,180 256,40" fill="#FFFFFF" opacity="0.45"/>

  <!-- ====== 闪电分支小电弧 ====== -->
  <g stroke="#FFE44D" fill="none" stroke-linecap="round" opacity="0.7" filter="url(#gl1)">
    <!-- 左侧分支 -->
    <path d="M 220 200 L 185 185 L 195 210"/>
    <path d="M 210 280 L 175 270"/>
    <path d="M 215 340 L 178 335"/>
    <path d="M 210 380 L 180 375 L 188 395"/>
    <!-- 右侧分支 -->
    <path d="M 292 200 L 327 185 L 317 210"/>
    <path d="M 302 280 L 337 270"/>
    <path d="M 297 340 L 334 335"/>
    <path d="M 302 380 L 332 375 L 324 395"/>
  </g>

  <!-- ====== 能量辐射线 (从闪电中心向外) ====== -->
  <g stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" opacity="0.35">
    <line x1="256" y1="250" x2="256" y2="200"/>
    <line x1="240" y1="260" x2="200" y2="230"/>
    <line x1="272" y1="260" x2="312" y2="230"/>
    <line x1="235" y1="290" x2="185" y2="280"/>
    <line x1="277" y1="290" x2="327" y2="280"/>
    <line x1="240" y1="320" x2="195" y2="330"/>
    <line x1="272" y1="320" x2="317" y2="330"/>
  </g>

  <!-- ====== 碎片 (三角形黑色碎片从耳罩飞出) ====== -->
  <g opacity="0.85">
    <!-- 左侧碎片 -->
    <polygon points="180,340 165,355 175,360" fill="#1a1a1a" stroke="#B8860B" stroke-width="1"/>
    <polygon points="165,380 148,390 160,395" fill="#1a1a1a" stroke="#B8860B" stroke-width="1"/>
    <polygon points="155,420 140,425 148,435" fill="#1a1a1a" stroke="#B8860B" stroke-width="1"/>
    <polygon points="190,310 178,320 185,325" fill="#1a1a1a" stroke="#B8860B" stroke-width="1"/>
    <polygon points="170,365 155,370 162,380" fill="#0a0a0a" stroke="#FFD700" stroke-width="0.8"/>
    <!-- 右侧碎片 -->
    <polygon points="332,340 347,355 337,360" fill="#1a1a1a" stroke="#B8860B" stroke-width="1"/>
    <polygon points="347,380 364,390 352,395" fill="#1a1a1a" stroke="#B8860B" stroke-width="1"/>
    <polygon points="357,420 372,425 364,435" fill="#1a1a1a" stroke="#B8860B" stroke-width="1"/>
    <polygon points="322,310 334,320 327,325" fill="#1a1a1a" stroke="#B8860B" stroke-width="1"/>
    <polygon points="342,365 357,370 350,380" fill="#0a0a0a" stroke="#FFD700" stroke-width="0.8"/>
  </g>

  <!-- ====== 音符 (左侧 + 右侧飞散) ====== -->
  <!-- 左上 八分音符 -->
  <g transform="rotate(-15, 70, 140)" opacity="0.9">
    <circle cx="70" cy="148" r="11" fill="#FFD700"/>
    <rect x="80" y="90" width="4" height="58" rx="2" fill="#FFD700"/>
    <path d="M 84 90 C 100 87 105 108 90 118" fill="#FFD700"/>
  </g>
  <!-- 左中 高音谱号 -->
  <g transform="rotate(10, 55, 310)" opacity="0.75">
    <path d="M 60 290 C 50 300 45 320 55 340 C 65 355 55 370 48 365 C 42 360 45 345 55 335" fill="none" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="290" r="7" fill="#FFD700"/>
    <rect x="57" y="260" width="3" height="32" rx="1.5" fill="#FFD700"/>
  </g>
  <!-- 左下 单音符 -->
  <g transform="rotate(20, 55, 460)" opacity="0.7">
    <circle cx="55" cy="462" r="9" fill="#FFD700"/>
    <rect x="63" y="415" width="3" height="47" rx="1.5" fill="#FFD700"/>
    <path d="M 66 415 C 78 413 80 426 70 432" fill="#FFD700"/>
  </g>
  <!-- 右上 八分音符 -->
  <g transform="rotate(12, 450, 130)" opacity="0.85">
    <circle cx="450" cy="138" r="10" fill="#FFD700"/>
    <rect x="459" y="82" width="3.5" height="56" rx="1.8" fill="#FFD700"/>
    <path d="M 462 82 C 476 80 478 96 468 104" fill="#FFD700"/>
  </g>
  <!-- 右中 双音符 -->
  <g transform="rotate(-8, 448, 320)" opacity="0.7">
    <circle cx="445" cy="325" r="8" fill="#FFD700"/>
    <circle cx="462" cy="315" r="8" fill="#FFD700"/>
    <rect x="451" y="270" width="3" height="55" rx="1.5" fill="#FFD700"/>
    <rect x="468" y="262" width="3" height="53" rx="1.5" fill="#FFD700"/>
    <path d="M 454 270 C 462 268 468 266 474 262" stroke="#FFD700" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- 右下 单音符 -->
  <g transform="rotate(-18, 465, 470)" opacity="0.65">
    <circle cx="465" cy="472" r="8" fill="#FFD700"/>
    <rect x="472" y="428" width="3" height="44" rx="1.5" fill="#FFD700"/>
    <path d="M 475 428 C 486 426 488 438 479 443" fill="#FFD700"/>
  </g>

  <!-- ====== 小碎片 + 粒子 ====== -->
  <g opacity="0.6">
    <circle cx="240" cy="100" r="3" fill="#FFD700"/>
    <circle cx="275" cy="92" r="2.5" fill="#FFEE88"/>
    <circle cx="258" cy="75" r="2" fill="#FFF"/>
    <circle cx="250" cy="65" r="2" fill="#FFE44D"/>
    <circle cx="225" cy="150" r="2" fill="#FFCC00"/>
    <circle cx="290" cy="145" r="2" fill="#FFCC00"/>
    <circle cx="235" cy="200" r="1.5" fill="#FFD700"/>
    <circle cx="278" cy="195" r="1.5" fill="#FFD700"/>
  </g>
</svg>
