<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="lightning" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="50%" stop-color="#FFCC00"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- L with headphone arc -->
  <g filter="url(#glow)">
    <!-- Headphone band arc connecting L to the top -->
    <path d="M 120 200 Q 120 90 256 80 Q 392 90 392 200" stroke="url(#gold)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- Left headphone cup -->
    <rect x="90" y="185" width="60" height="90" rx="20" fill="url(#gold)"/>
    <!-- Right headphone cup -->
    <rect x="362" y="185" width="60" height="90" rx="20" fill="url(#gold)"/>
    <!-- L letter -->
    <path d="M 100 200 L 100 360 L 180 360" stroke="url(#gold)" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- M letter (right side) -->
  <g filter="url(#glow)">
    <path d="M 332 200 L 332 360" stroke="url(#gold)" stroke-width="20" fill="none" stroke-linecap="round"/>
    <path d="M 332 360 L 332 200 L 412 320 L 412 200" stroke="url(#gold)" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 412 200 L 412 360" stroke="url(#gold)" stroke-width="20" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Lightning bolt between L and M -->
  <g filter="url(#glow-strong)">
    <polygon points="256,140 230,250 268,250 220,390 290,260 252,260 290,140" fill="url(#lightning)"/>
  </g>

  <!-- Lightning spark accents -->
  <g filter="url(#glow-strong)" opacity="0.8">
    <line x1="210" y1="200" x2="190" y2="180" stroke="#FFE44D" stroke-width="3" stroke-linecap="round"/>
    <line x1="300" y1="200" x2="320" y2="180" stroke="#FFE44D" stroke-width="3" stroke-linecap="round"/>
    <line x1="220" y1="330" x2="200" y2="340" stroke="#FFE44D" stroke-width="2" stroke-linecap="round"/>
    <line x1="290" y1="330" x2="310" y2="340" stroke="#FFE44D" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
